{% extends 'base.html' %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-140px)] min-h-[580px]">
    <!-- Left Column: Saved Study Sets Sidebar (Span 4) -->
    <div class="lg:col-span-4 flex flex-col gap-6">
        <div class="bg-[#0c0c0c] rounded-2xl border border-white/5 p-6 shadow-2xl flex flex-col h-full overflow-hidden">
            <div class="flex items-center gap-3 mb-6">
                <div class="p-2.5 bg-white/5 text-white rounded-xl border border-white/10">
                    <i data-lucide="history" class="w-5 h-5"></i>
                </div>
                <div>
                    <h2 class="font-serif text-lg font-bold text-white tracking-tight">Saved Study Sets</h2>
                    <p class="text-[10px] text-zinc-500 uppercase tracking-widest font-medium">Access Saved Collections</p>
                </div>
            </div>

            <!-- List Container -->
            <div id="historyList" class="flex-1 overflow-y-auto space-y-3 pr-1">
                <!-- Will be populated dynamically by JS -->
            </div>
        </div>
    </div>

    <!-- Right Column: Active Study Stage + Quiz Engine (Span 8) -->
    <div class="lg:col-span-8 flex flex-col h-full min-w-0">
        <div id="activeStageContainer" class="bg-[#0d0d0d] rounded-2xl border border-white/10 shadow-2xl flex flex-col h-full overflow-hidden min-h-[500px]">
            <!-- Empty state when no sets -->
            <div id="emptyViewerState" class="hidden flex-1 flex flex-col items-center justify-center p-8 text-center h-full">
                <div class="w-14 h-14 bg-white/5 border border-white/10 text-white rounded-2xl flex items-center justify-center mb-4">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                </div>
                <h3 class="font-serif text-base font-bold text-white mb-1.5">No Study Set Selected</h3>
                <p class="text-xs text-zinc-500 max-w-xs mb-6 leading-relaxed">
                    Select a set from the history panel on the left or generate a new set in the workspace.
                </p>
                <a href="{{ url_for('index') }}" class="px-5 py-2.5 rounded-full text-xs font-bold text-black bg-white hover:bg-zinc-200 transition-all uppercase tracking-widest font-sans">
                    Generate New Questions
                </a>
            </div>

            <!-- Header Panel (Populated dynamically) -->
            <div id="viewerHeader" class="border-b border-white/10 p-5 bg-[#0a0a0a]/40 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                    <div class="flex items-center gap-2">
                        <span id="headerDifficulty" class="px-2.5 py-0.5 bg-white/10 text-zinc-300 font-bold text-[10px] rounded-full uppercase tracking-wide">
                            Medium
                        </span>
                        <span id="headerFormat" class="px-2.5 py-0.5 bg-white/5 border border-white/10 text-zinc-400 font-bold text-[10px] rounded-full uppercase tracking-wide">
                            MULTIPLE CHOICE
                        </span>
                    </div>
                    <h1 id="headerTopic" class="font-serif text-lg font-bold text-white mt-1.5 truncate max-w-md tracking-tight">
                        Photosynthesis Basics
                    </h1>
                </div>

                <div class="flex items-center gap-2 flex-wrap">
                    <!-- Toggle Switch Review vs Quiz -->
                    <div class="bg-[#0a0a0a] p-1 rounded-xl flex gap-1 text-[11px] font-bold border border-white/5">
                        <button onclick="switchViewMode('review')" id="btnViewReview" class="px-3 py-1.5 rounded-lg transition-all cursor-pointer uppercase tracking-wider bg-white text-black font-bold">
                            Study List
                        </button>
                        <button onclick="switchViewMode('quiz')" id="btnViewQuiz" class="px-3 py-1.5 rounded-lg transition-all cursor-pointer uppercase tracking-wider text-zinc-500 hover:text-zinc-200">
                            Take Quiz
                        </button>
                    </div>

                    <!-- Actions -->
                    <div class="flex gap-1">
                        <button onclick="exportTxt()" title="Download TXT" class="p-2 text-zinc-400 hover:text-white bg-white/5 border border-white/10 rounded-xl cursor-pointer transition-colors">
                            <i data-lucide="file-down" class="w-4 h-4"></i>
                        </button>
                        <button onclick="exportJson()" title="Download JSON Schema" class="p-2 text-zinc-400 hover:text-white bg-white/5 border border-white/10 rounded-xl cursor-pointer transition-colors">
                            <i data-lucide="download" class="w-4 h-4"></i>
                        </button>
                        <a id="btnDeleteSet" href="#" title="Delete Study Set" class="p-2 text-zinc-500 hover:text-red-400 bg-white/5 border border-white/10 rounded-xl cursor-pointer transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Main Interactive Content Stage -->
            <div id="viewerBody" class="flex-1 overflow-y-auto p-6 bg-[#0a0a0a]/30">
                <!-- Will load Study List or Take Quiz state -->
            </div>
        </div>
    </div>
</div>

<script>
    // Embed Flask-loaded sets array safely into Client JS
    const savedSets = {{ sets|tojson|safe }};
    
    // Core Client State Machine
    let activeSetId = null;
    let activeViewMode = 'review'; // 'review' or 'quiz'
    
    // Quiz State Tracker
    let quizCurrentIndex = 0;
    let quizAnswers = {}; // { questionId: selectedOption }
    let quizSubmitted = false;
    let quizScore = 0;
    
    // Explanations show/hide index tracker
    let expandedExplanations = {}; // { questionId: boolean }

    // Initialize sidebar and active content
    document.addEventListener("DOMContentLoaded", function() {
        if (savedSets && savedSets.length > 0) {
            // Select first set by default
            activeSetId = savedSets[0].id;
            renderHistoryList();
            renderActiveSet();
        } else {
            // Show empty state
            document.getElementById('viewerHeader').classList.add('hidden');
            document.getElementById('viewerBody').classList.add('hidden');
            document.getElementById('emptyViewerState').classList.remove('hidden');
            renderHistoryList();
        }
    });

    // Render left sidebar history collection list
    function renderHistoryList() {
        const listContainer = document.getElementById('historyList');
        listContainer.innerHTML = '';

        if (savedSets.length === 0) {
            listContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center h-48 text-center px-4 bg-white/[0.02] border border-white/5 rounded-xl py-8">
                    <div class="p-3 bg-white/5 text-zinc-500 rounded-full mb-3 border border-white/5">
                        <i data-lucide="history" class="w-5 h-5"></i>
                    </div>
                    <p class="text-xs font-semibold text-zinc-400">No sets saved yet</p>
                    <p class="text-[10px] text-zinc-600 mt-1 max-w-[200px] leading-relaxed">
                        Generate a set and save it to build your history dashboard.
                    </p>
                </div>
            `;
            lucide.createIcons();
            return;
        }

        savedSets.forEach(set => {
            const isSelected = set.id === activeSetId;
            const dateStr = new Date(set.created_at).toLocaleDateString(undefined, {
                month: 'short',
                day: 'numeric'
            });

            const card = document.createElement('div');
            card.onclick = () => selectActiveSet(set.id);
            card.className = `group flex items-center justify-between p-3.5 rounded-xl border text-left cursor-pointer transition-all ${
                isSelected 
                    ? 'border-white/30 bg-white/10 text-white shadow-md' 
                    : 'border-white/5 hover:border-white/15 bg-white/[0.02]'
            }`;

            card.innerHTML = `
                <div class="flex-1 min-w-0 mr-4">
                    <div class="flex items-center gap-1.5 mb-1 flex-wrap">
                        <span class="px-1.5 py-0.5 bg-white/10 text-zinc-300 font-bold text-[9px] rounded-sm uppercase tracking-wide">
                            ${set.difficulty}
                        </span>
                        <span class="text-[10px] text-zinc-500 font-mono flex items-center gap-1">
                            <i data-lucide="calendar" class="w-3 h-3 text-zinc-600"></i>
                            ${dateStr}
                        </span>
                    </div>
                    <h3 class="text-xs font-bold truncate transition-colors ${
                        isSelected ? 'text-white' : 'text-zinc-300 group-hover:text-white'
                    }">
                        ${set.topic}
                    </h3>
                    <p class="text-[10px] text-zinc-500 flex items-center gap-1 mt-0.5 font-medium">
                        <i data-lucide="file-text" class="w-3 h-3 text-zinc-600"></i>
                        <span>${set.questions.length} questions • ${set.question_type.replace('-', ' ')}</span>
                    </p>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="event.stopPropagation(); deleteSetAndReload(${set.id})" title="Delete Set" class="p-1.5 text-zinc-500 hover:text-red-400 hover:bg-white/5 rounded-lg opacity-0 group-hover:opacity-100 transition-all cursor-pointer">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                    <i data-lucide="arrow-right" class="w-3.5 h-3.5 text-zinc-600 group-hover:text-white transition-all group-hover:translate-x-0.5"></i>
                </div>
            `;

            listContainer.appendChild(card);
        });

        lucide.createIcons();
    }

    // Select Active Set and Reset UI States
    function selectActiveSet(id) {
        activeSetId = id;
        activeViewMode = 'review';
        quizCurrentIndex = 0;
        quizAnswers = {};
        quizSubmitted = false;
        quizScore = 0;
        expandedExplanations = {};

        renderHistoryList();
        renderActiveSet();
    }

    // Direct delete utility with prompt
    function deleteSetAndReload(id) {
        if (confirm("Are you sure you want to permanently delete this study set?")) {
            window.location.href = `/delete-set/${id}`;
        }
    }

    // Render active selection content stage
    function renderActiveSet() {
        const set = savedSets.find(s => s.id === activeSetId);
        if (!set) return;

        // Render header details
        document.getElementById('headerDifficulty').innerText = set.difficulty;
        document.getElementById('headerFormat').innerText = set.question_type.replace('-', ' ').toUpperCase();
        document.getElementById('headerTopic').innerText = set.topic;
        document.getElementById('btnDeleteSet').href = `javascript:deleteSetAndReload(${set.id})`;

        // Set review mode toggler states
        const btnReview = document.getElementById('btnViewReview');
        const btnQuiz = document.getElementById('btnViewQuiz');
        if (activeViewMode === 'review') {
            btnReview.className = "px-3 py-1.5 rounded-lg transition-all cursor-pointer uppercase tracking-wider bg-white text-black font-bold";
            btnQuiz.className = "px-3 py-1.5 rounded-lg transition-all cursor-pointer uppercase tracking-wider text-zinc-500 hover:text-zinc-200";
            renderStudyList(set);
        } else {
            btnQuiz.className = "px-3 py-1.5 rounded-lg transition-all cursor-pointer uppercase tracking-wider bg-white text-black font-bold";
            btnReview.className = "px-3 py-1.5 rounded-lg transition-all cursor-pointer uppercase tracking-wider text-zinc-500 hover:text-zinc-200";
            renderInteractiveQuiz(set);
        }
    }

    // Switch Review <-> Quiz Toggles
    function switchViewMode(mode) {
        activeViewMode = mode;
        renderActiveSet();
    }

    // Mode A: Render Study List Reviewer Page
    function renderStudyList(set) {
        const body = document.getElementById('viewerBody');
        body.innerHTML = '';

        const container = document.createElement('div');
        container.className = "space-y-4";

        set.questions.forEach((q, idx) => {
            const isExpanded = expandedExplanations[q.id] || false;
            const item = document.createElement('div');
            item.className = "bg-[#121212] border border-white/5 rounded-xl p-5 shadow-lg";

            let optionsHtml = '';
            if (q.options && q.options.length > 0) {
                optionsHtml = `<div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-4">`;
                q.options.forEach((opt, oIdx) => {
                    const isCorrect = opt.trim().toLowerCase() === q.correct_answer.trim().toLowerCase();
                    const highlightClass = (isExpanded && isCorrect) 
                        ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-300 font-bold' 
                        : 'bg-white/5 border-white/5';

                    optionsHtml += `
                        <div class="p-3 text-xs rounded-xl border text-zinc-300 font-medium ${highlightClass}">
                            <span class="font-mono text-[10px] font-bold text-zinc-500 mr-1.5">
                                ${String.fromCharCode(65 + oIdx)}.
                            </span>
                            ${opt}
                        </div>
                    `;
                });
                optionsHtml += `</div>`;
            }

            item.innerHTML = `
                <div class="flex items-start justify-between gap-4 mb-3">
                    <span class="font-mono text-xs text-zinc-400 font-bold bg-white/5 border border-white/10 px-2 py-0.5 rounded-md">
                        Q${idx + 1}
                    </span>
                    <button onclick="toggleExplanation(${q.id})" class="flex items-center gap-1 text-xs text-zinc-400 hover:text-white font-semibold cursor-pointer transition-colors">
                        <i data-lucide="eye" class="w-3.5 h-3.5"></i>
                        <span>${isExpanded ? 'Hide Answer' : 'Show Answer'}</span>
                    </button>
                </div>

                <p class="font-medium text-white text-sm mb-4 leading-relaxed">
                    ${q.question_text}
                </p>

                ${optionsHtml}

                <div id="explanation_box_${q.id}" class="${isExpanded ? 'block' : 'hidden'} mt-4 pt-4 border-t border-dashed border-white/5">
                    <div class="flex items-center gap-1.5 text-xs text-emerald-400 font-bold mb-2">
                        <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-400"></i>
                        <span>Correct Answer: ${q.correct_answer}</span>
                    </div>
                    <div class="bg-[#0c0c0c] rounded-lg p-3.5 text-xs text-zinc-400 leading-relaxed border border-white/5">
                        <span class="font-bold text-zinc-300 block mb-1">Explanation:</span>
                        ${q.explanation}
                    </div>
                </div>
            `;

            container.appendChild(item);
        });

        body.appendChild(container);
        lucide.createIcons();
    }

    // Toggle Show/Hide Correct Answer card in study list
    function toggleExplanation(qId) {
        expandedExplanations[qId] = !expandedExplanations[qId];
        renderActiveSet();
    }

    // Mode B: Render Interactive Quiz taking slides
    function renderInteractiveQuiz(set) {
        const body = document.getElementById('viewerBody');
        body.innerHTML = '';

        const container = document.createElement('div');
        container.className = "max-w-2xl mx-auto h-full flex flex-col justify-between";

        if (!quizSubmitted) {
            // Render ongoing quiz questions
            const totalQuestions = set.questions.length;
            const progress = (quizCurrentIndex / totalQuestions) * 100;
            const q = set.questions[quizCurrentIndex];
            const selectedAnswer = quizAnswers[q.id] || '';

            let inputHtml = '';
            if (q.options && q.options.length > 0) {
                inputHtml = `<div class="space-y-2.5">`;
                q.options.forEach((opt, oIdx) => {
                    const isSelected = selectedAnswer === opt;
                    const selectStyle = isSelected 
                        ? 'border-white/30 bg-white/10 text-white font-bold shadow-md' 
                        : 'border-white/5 bg-[#0a0a0a]/40 hover:border-white/15 hover:bg-white/[0.02] text-zinc-400 hover:text-white';

                    inputHtml += `
                        <button onclick="quizSelectAnswer(${q.id}, '${opt.replace(/'/g, "\\'")}')" class="w-full flex items-center justify-start p-3.5 rounded-xl border text-left text-xs font-semibold transition-all cursor-pointer ${selectStyle}">
                            <span class="font-mono text-[10px] font-bold text-zinc-500 mr-2">
                                ${String.fromCharCode(65 + oIdx)}.
                            </span>
                            <span>${opt}</span>
                        </button>
                    `;
                });
                inputHtml += `</div>`;
            } else {
                // Short text answer
                inputHtml += `
                    <div>
                        <input type="text" value="${selectedAnswer}" onchange="quizSelectAnswer(${q.id}, this.value)" placeholder="Type your short answer here..." class="w-full px-4 py-3 bg-[#0a0a0a] border border-white/10 rounded-xl text-sm text-white placeholder:text-zinc-700 focus:outline-none focus:border-white/30 font-sans">
                        <p class="text-[10px] text-zinc-500 mt-2 font-medium">
                            Note: Answers will be matched directly (non case-sensitive) with the primary correct key.
                        </p>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="space-y-6 flex-1 flex flex-col justify-between">
                    <div>
                        <!-- Progress Header -->
                        <div class="flex items-center justify-between text-xs text-zinc-500 font-bold mb-2 uppercase tracking-wide">
                            <span>Question ${quizCurrentIndex + 1} of ${totalQuestions}</span>
                            <span>${Math.round(progress)}% Complete</span>
                        </div>
                        <div class="w-full h-1.5 bg-zinc-800 rounded-full overflow-hidden mb-6">
                            <div class="h-full bg-white transition-all duration-300" style="width: ${progress}%"></div>
                        </div>

                        <!-- Active question content block -->
                        <div class="bg-[#121212] border border-white/10 rounded-xl p-6 shadow-2xl animate-fade-in">
                            <p class="text-base font-bold text-white mb-6 leading-relaxed">
                                ${q.question_text}
                            </p>
                            ${inputHtml}
                        </div>
                    </div>

                    <!-- Slide Controls -->
                    <div class="flex items-center justify-between mt-8 border-t border-white/10 pt-4">
                        <button onclick="quizPrev()" ${quizCurrentIndex === 0 ? 'disabled' : ''} class="px-4 py-2 text-xs font-bold text-zinc-500 hover:text-white disabled:opacity-20 disabled:pointer-events-none cursor-pointer transition-colors uppercase tracking-wider">
                            Previous
                        </button>

                        ${quizCurrentIndex < totalQuestions - 1 
                            ? `<button onclick="quizNext()" class="px-5 py-2.5 rounded-full text-xs font-bold text-black bg-white hover:bg-zinc-200 shadow-sm cursor-pointer uppercase tracking-widest font-sans">Next Question</button>` 
                            : `<button onclick="submitQuizResults()" class="px-6 py-2.5 rounded-full text-xs font-bold text-black bg-emerald-400 hover:bg-emerald-300 shadow-sm cursor-pointer uppercase tracking-widest font-sans">Finish Quiz</button>`
                        }
                    </div>
                </div>
            `;
        } else {
            // Render Quiz Results scoreboard and correct answer keys
            let total = set.questions.length;
            let percentRate = Math.round((quizScore / total) * 100);

            let breakdownHtml = `<div class="space-y-4">`;
            breakdownHtml += `<h4 class="text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">Question Breakdown</h4>`;
            
            set.questions.forEach((q, idx) => {
                const userAns = quizAnswers[q.id] || '';
                const isCorrect = userAns.trim().toLowerCase() === q.correct_answer.trim().toLowerCase();

                breakdownHtml += `
                    <div class="bg-[#121212] border border-white/5 rounded-xl p-5">
                        <div class="flex items-center justify-between mb-3">
                            <span class="font-mono text-xs text-zinc-500 font-bold">
                                Question ${idx + 1}
                            </span>
                            <div class="flex items-center gap-1.5">
                                ${isCorrect 
                                    ? `<div class="flex items-center gap-1 text-xs text-emerald-300 font-bold bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.5 rounded-full"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i><span>Correct</span></div>` 
                                    : `<div class="flex items-center gap-1 text-xs text-red-300 font-bold bg-red-500/10 border border-red-500/20 px-2 py-0.5 rounded-full"><i data-lucide="alert-circle" class="w-3.5 h-3.5"></i><span>Incorrect</span></div>`
                                }
                            </div>
                        </div>

                        <p class="font-medium text-white text-sm mb-3">
                            ${q.question_text}
                        </p>

                        <div class="space-y-1.5 text-xs mb-3">
                            <div class="flex gap-2">
                                <span class="text-zinc-500 font-medium">Your answer:</span>
                                <span class="font-semibold ${isCorrect ? 'text-emerald-300' : 'text-red-300'}">${userAns || '(No Answer)'}</span>
                            </div>
                            ${!isCorrect 
                                ? `<div class="flex gap-2"><span class="text-zinc-500 font-medium">Correct answer:</span><span class="text-emerald-300 font-semibold">${q.correct_answer}</span></div>` 
                                : ''
                            }
                        </div>

                        <div class="bg-[#0c0c0c] rounded-lg p-3 text-xs text-zinc-400 leading-relaxed border border-white/5">
                            <span class="font-bold text-zinc-300 block mb-0.5">Explanation:</span>
                            ${q.explanation}
                        </div>
                    </div>
                `;
            });
            breakdownHtml += `</div>`;

            container.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-[#121212] border border-white/10 rounded-xl p-6 shadow-sm text-center">
                        <div class="w-16 h-16 bg-white/5 text-white border border-white/10 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="book-open" class="w-6 h-6"></i>
                        </div>
                        <h3 class="font-serif text-xl font-bold text-white mb-1">Quiz Completed!</h3>
                        <p class="text-xs text-zinc-500 mb-4">Here is how you scored on this set</p>
                        
                        <div class="inline-flex items-center justify-center font-mono text-3xl font-extrabold text-white bg-white/10 border border-white/5 px-6 py-2.5 rounded-2xl mb-4">
                            ${quizScore} / ${total}
                        </div>
                        
                        <p class="text-xs font-medium text-zinc-400">
                            Accuracy Rate: <span class="font-bold text-white">${percentRate}%</span>
                        </p>

                        <button onclick="quizResetAll()" class="mt-5 inline-flex items-center gap-1.5 px-4 py-2 text-xs font-bold text-zinc-300 bg-white/5 border border-white/10 hover:bg-white/10 rounded-full transition-all cursor-pointer uppercase tracking-wider">
                            <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                            <span>Retake Quiz</span>
                        </button>
                    </div>

                    ${breakdownHtml}
                </div>
            `;
        }

        body.appendChild(container);
        lucide.createIcons();
    }

    // Select Option / Store answer value
    function quizSelectAnswer(qId, val) {
        if (quizSubmitted) return;
        quizAnswers[qId] = val;
        renderActiveSet();
    }

    // Slide Controls
    function quizPrev() {
        quizCurrentIndex = Math.max(0, quizCurrentIndex - 1);
        renderActiveSet();
    }
    function quizNext() {
        quizCurrentIndex = quizCurrentIndex + 1;
        renderActiveSet();
    }

    // Quiz Reset Retake Action
    function quizResetAll() {
        quizCurrentIndex = 0;
        quizAnswers = {};
        quizSubmitted = false;
        quizScore = 0;
        renderActiveSet();
    }

    // Submit Answers and Fetch AJAX endpoint to update profile scores
    function submitQuizResults() {
        const set = savedSets.find(s => s.id === activeSetId);
        if (!set) return;

        let score = 0;
        set.questions.forEach(q => {
            const userAnswer = (quizAnswers[q.id] || '').trim().toLowerCase();
            const correctAnswer = q.correct_answer.trim().toLowerCase();
            if (userAnswer === correctAnswer) {
                score++;
            }
        });

        quizScore = score;
        quizSubmitted = true;

        // Perform AJAX API call to update server profile stats
        fetch('/api/quiz-taken', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                score: quizScore,
                total: set.questions.length
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log("Stats update response:", data);
        })
        .catch(err => {
            console.error("Failed to sync score with server:", err);
        })
        .finally(() => {
            renderActiveSet();
        });
    }

    // Export Txt File format client side
    function exportTxt() {
        const set = savedSets.find(s => s.id === activeSetId);
        if (!set) return;

        let output = `==================================================\n`;
        output += `AI BASED QUESTION GENERATOR - STUDY SET\n`;
        output += `==================================================\n`;
        output += `Topic: ${set.topic}\n`;
        output += `Difficulty: ${set.difficulty}\n`;
        output += `Format: ${set.question_type}\n`;
        output += `Generated on: ${new Date(set.created_at).toLocaleDateString()}\n\n`;

        set.questions.forEach((q, idx) => {
            output += `${idx + 1}. ${q.question_text}\n`;
            if (q.options && q.options.length > 0) {
                q.options.forEach((opt, oIdx) => {
                    output += `   ${String.fromCharCode(65 + oIdx)}) ${opt}\n`;
                });
            }
            output += `Correct Answer: ${q.correct_answer}\n`;
            output += `Explanation: ${q.explanation}\n\n`;
            output += `--------------------------------------------------\n\n`;
        });

        const element = document.createElement('a');
        const file = new Blob([output], { type: 'text/plain;charset=utf-8' });
        element.href = URL.createObjectURL(file);
        element.download = `${set.topic.replace(/\s+/g, '_')}_questions.txt`;
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }

    // Export JSON schema
    function exportJson() {
        const set = savedSets.find(s => s.id === activeSetId);
        if (!set) return;

        const dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(set, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute('href', dataStr);
        downloadAnchor.setAttribute('download', `${set.topic.replace(/\s+/g, '_')}_questions.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }
</script>
{% endblock %}
